<!DOCTYPE html>
<html lang="ko" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>practice</title>
    <link rel="stylesheet" href="../master.css">
    <style media="screen">
      .container .top{
        width: 100%;
        height: 150px;
      }

      .container div:not(.top){
        height: calc(100% - 150px);
        float: left;
        width: 20%;
      }

      .container div:last-child{
        width: 80%;
      }

    </style>
  </head>
  <body>
    <div class="container">
      <div class="top"></div>
      <div></div>
      <div></div>
    </div>
  </body>
</html>
