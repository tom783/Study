<!DOCTYPE html>
<html lang="ko" dir="ltr">
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.4.2/css/all.css" integrity="sha384-/rXc/GQVaYpyDdyxK+ecHPVYJSN9bmVFBvjA/9eOB+pb3F2w2N6fc5qB9Ew5yIns" crossorigin="anonymous">

    <script
    src="https://code.jquery.com/jquery-3.3.1.min.js"
    integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZxltwRo8QtmkMRdAu8="
    crossorigin="anonymous"></script>
    <script type="text/javascript" src="./index.js">
    </script>
    <title>광명문화원 클론 사이트</title>
  </head>
  <body>
    <!-- header -->
    <header>
      <aside class="sideNav">
        <div class="sideNav_position positionMargin">
          <ul>
            <li><a href="#">로그인</a></li>
            <li><a href="#">회원가입</a></li>
            <li><a href="#">신천내역 확인</a></li>
            <li><a href="#">사이트맵</a></li>
          </ul>
        </div>
      </aside>
      <nav>
        <div class="nav_position positionMargin">
          <div class="logo">
            <a href="#"><img src="http://www.gmcc.or.kr/images/main/logo.jpg" alt=""></a>
          </div>
          <div class="navbar_position">
            <ul class="nav">
              <li><a href="#">기관소개</a></li>
              <li><a href="#">문화사업</a></li>
              <li><a href="#">문화학교</a></li>
              <li><a href="#">광명의 문화</a></li>
              <li><a href="#">자료실</a></li>
              <li><a href="#">참여마당</a></li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <!-- main -->
    <main class="positionMargin">
      <!-- slide -->
      <section class="slide">
        <ul class="slider">
          <li><a href="#"><img src="http://www.gmcc.or.kr/rolling_banner/item/572dc218d3.png" alt=""></a></li>
          <li><a href="#"><img src="http://www.gmcc.or.kr/rolling_banner/item/74c7b6f2a3.png" alt=""></a></li>
          <li><a href="#"><img src="http://www.gmcc.or.kr/rolling_banner/item/b913ada5bc.png" alt=""></a></li>
        </ul>
        <div class="toggle">
          <span>1</span>
          <span>2</span>
          <span>3</span>
        </div>
      </section>

      <!-- contents -->
      <section class="contents">
        <div class="content_box program">
          <h1>프로그램</h1>
          <span class="button">
            <a href="#"><img src="http://www.gmcc.or.kr/images/main/btn_more.png" alt=""></a>
          </span>
          <p>광명문화원프로그램<br>안내입니다.</p>
        </div>

        <div class="content_box course">
          <h1>강좌신청</h1>
          <span class="button">
            <a href="#"><img src="http://www.gmcc.or.kr/images/main/btn_more.png" alt=""></a>
          </span>
          <p>광명문화원 강좌신청<br>안내입니다.</p>
        </div>

        <div class="content_box rent">
          <h1>대관신청</h1>
          <span class="button">
            <a href="#"><img src="http://www.gmcc.or.kr/images/main/btn_more.png" alt=""></a>
          </span>
          <p>광명문화원 대관신청<br>안내입니다.</p>
        </div>

        <div class="content_box come">
          <h1>찾아오시는 길</h1>
          <span class="button">
            <a href="#"><img src="" alt=""></a>
          </span>
          <p>광명문화원 오시는길<br>안내입니다.</p>
        </div>
      </section>

      <section class="board">
        <article class="notice">
          <div class="title">
            <h1>공지사항</h1>
            <h1>행사안내</h1>
          </div>
          <span class="button">
            <a href="#"><img src="http://www.gmcc.or.kr/images/main/btn_more2.png" alt=""></a>
          </span>
          <div class="board_contents">
            <ul class="notice_content">
              <li>ba</li>
              <li>adsf</li>
              <li>asfd</li>
              <li>adf</li>
            </ul>

            <ul class="event_content" style="display:none">
              <li>fff</li>
              <li>fffd</li>
              <li>sdf</li>
              <li>ffffdddd</li>
            </ul>
          </div>
        </article>
        <article class="photo">
          <h1>사진/영상</h1>
          <span class="button">
            <a href="#"><img src="http://www.gmcc.or.kr/images/main/btn_more2.png" alt=""></a>
          </span>
          <div class="photo_list">
            <ul>
              <li><a href="#"><img src="http://www.gmcc.or.kr/editor/upload/img/1540951086.jpg" alt=""></a></li>
              <li><a href="#"><img src="http://www.gmcc.or.kr/editor/upload/img/1534122267.jpg" alt=""></a></li>
              <li><a href="#"><img src="" alt=""></a></li>
            </ul>
          </div>
        </article>
      </section>

    </main>
  </body>
</html>
